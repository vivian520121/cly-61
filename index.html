<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文艺手写书信生成器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>✒️ 文艺手写书信生成器</h1>
            <p class="subtitle">用文字传递温暖，让书信承载情意</p>
        </header>

        <div class="main-layout">
            <aside class="draft-sidebar">
                <div class="panel">
                    <h3>📁 草稿箱</h3>
                    <div class="draft-actions">
                        <button id="new-draft" class="btn-primary">✏️ 新建草稿</button>
                        <button id="clear-all-drafts" class="btn-danger">🗑️ 清空全部</button>
                    </div>
                    <div class="folder-section">
                        <div class="folder-header">
                            <span class="folder-title">📂 分类文件夹</span>
                            <button id="add-folder" class="btn-add-folder" title="新建分类">➕</button>
                        </div>
                        <div id="folder-list" class="folder-list"></div>
                    </div>
                    <div class="draft-filter">
                        <label>
                            <input type="checkbox" id="show-archived"> 显示已归档
                        </label>
                    </div>
                    <div id="batch-actions" class="batch-actions-drafts" style="display:none;">
                        <div class="batch-info-drafts">
                            <span class="selected-count-drafts">已选 0 份</span>
                            <label class="select-all-label-drafts">
                                <input type="checkbox" id="select-all-drafts"> 全选
                            </label>
                        </div>
                        <div class="batch-buttons-drafts">
                            <button id="batch-archive" class="btn-batch-draft" disabled>📦 批量归档</button>
                            <button id="batch-export" class="btn-batch-draft" disabled>📤 批量导出</button>
                            <button id="batch-move" class="btn-batch-draft" disabled>📂 移动到</button>
                            <button id="batch-cancel" class="btn-batch-draft btn-batch-cancel">取消选择</button>
                        </div>
                    </div>
                    <div id="draft-list" class="draft-list"></div>
                </div>
            </aside>

            <aside class="sidebar">
                <div class="panel">
                    <h3>📄 信纸模板</h3>
                    <div class="template-grid">
                        <button class="template-btn active" data-template="line">
                            <div class="template-preview template-line"></div>
                            <span>横线稿纸</span>
                        </button>
                        <button class="template-btn" data-template="grid">
                            <div class="template-preview template-grid"></div>
                            <span>方格信笺</span>
                        </button>
                        <button class="template-btn" data-template="vintage">
                            <div class="template-preview template-vintage"></div>
                            <span>复古欧式</span>
                        </button>
                        <button class="template-btn" data-template="vertical">
                            <div class="template-preview template-vertical"></div>
                            <span>古风竖写</span>
                        </button>
                    </div>
                </div>

                <div class="panel">
                    <h3>✍️ 书写模式</h3>
                    <div class="mode-switch">
                        <button class="mode-btn active" data-mode="text">⌨️ 文字输入</button>
                        <button class="mode-btn" data-mode="draw">🖌️ 自由书写</button>
                    </div>
                </div>

                <div class="panel" id="text-panel">
                    <h3>📝 文字内容</h3>
                    <textarea id="letter-content" placeholder="在此输入您的书信内容...&#10;&#10;亲爱的XX：&#10;    展信佳！"></textarea>
                    <div class="style-controls">
                        <div class="control-row">
                            <label>字体样式</label>
                            <select id="font-family">
                                <option value="handwriting1">文艺手写体</option>
                                <option value="handwriting2">优雅行楷</option>
                                <option value="handwriting3">古风楷书</option>
                            </select>
                        </div>
                        <div class="control-row">
                            <label>字号</label>
                            <input type="range" id="font-size" min="14" max="36" value="20">
                            <span id="font-size-value">20px</span>
                        </div>
                        <div class="control-row">
                            <label>墨迹颜色</label>
                            <input type="color" id="ink-color" value="#3d3530">
                        </div>
                        <div class="control-row">
                            <label>笔触抖动</label>
                            <input type="range" id="wobble" min="0" max="5" value="2" step="0.5">
                            <span id="wobble-value">2</span>
                        </div>
                    </div>
                </div>

                <div class="panel" id="draw-panel" style="display:none;">
                    <h3>🖌️ 画笔设置</h3>
                    <div class="style-controls">
                        <div class="control-row">
                            <label>画笔颜色</label>
                            <input type="color" id="brush-color" value="#3d3530">
                        </div>
                        <div class="control-row">
                            <label>画笔粗细</label>
                            <input type="range" id="brush-size" min="1" max="10" value="3">
                            <span id="brush-size-value">3px</span>
                        </div>
                        <div class="control-row">
                            <label>笔触抖动</label>
                            <input type="range" id="draw-wobble" min="0" max="5" value="1.5" step="0.5">
                            <span id="draw-wobble-value">1.5</span>
                        </div>
                        <button id="clear-drawing" class="btn-secondary">🗑️ 清空书写</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>🎨 装饰素材</h3>
                    <div class="decoration-types">
                        <button class="deco-type-btn active" data-type="flower">🌸 干花</button>
                        <button class="deco-type-btn" data-type="ribbon">🎀 丝带</button>
                        <button class="deco-type-btn" data-type="wax">🔮 火漆</button>
                        <button class="deco-type-btn" data-type="stamp">📮 邮票</button>
                    </div>
                    <div class="color-picker-section">
                        <span class="color-picker-label">马卡龙配色：</span>
                        <div class="color-options">
                            <button class="color-option" data-color="pink" style="background-color: #f5b8c8;" title="樱花粉"></button>
                            <button class="color-option" data-color="peach" style="background-color: #fcc8a8;" title="蜜桃橙"></button>
                            <button class="color-option" data-color="yellow" style="background-color: #fce8a8;" title="柠檬黄"></button>
                            <button class="color-option" data-color="green" style="background-color: #b8d8b8;" title="薄荷绿"></button>
                            <button class="color-option" data-color="blue" style="background-color: #a8c8e8;" title="天空蓝"></button>
                            <button class="color-option" data-color="purple" style="background-color: #d0b8e8;" title="薰衣草紫"></button>
                            <button class="color-option" data-color="cream" style="background-color: #f5e8d8;" title="奶油白"></button>
                            <button class="color-option" data-color="brown" style="background-color: #c8a888;" title="焦糖棕"></button>
                            <button class="color-option active" data-color="default" style="background: linear-gradient(135deg, #f5b8c8, #a8c8e8, #d0b8e8);" title="默认原色">✨</button>
                        </div>
                    </div>
                    <div class="decoration-preview">
                        <span class="preview-label">当前选择：</span>
                        <span id="decoration-preview-text">🌸 干花 (默认)</span>
                    </div>
                    <button id="add-decoration-btn" class="btn-primary">➕ 添加装饰</button>
                    <button id="clear-decorations" class="btn-secondary">清除装饰</button>
                </div>

                <div class="panel">
                    <h3>🖼️ 我的素材</h3>
                    <div class="upload-section">
                        <label class="upload-btn" for="custom-material-upload">
                            <span class="upload-icon">📤</span>
                            <span>上传素材</span>
                        </label>
                        <input type="file" id="custom-material-upload" accept="image/*" style="display:none;">
                        <p class="upload-hint">支持上传本地图片，自动适配低饱和色调</p>
                    </div>
                    <div id="custom-materials-grid" class="custom-materials-grid"></div>
                </div>

                <div class="panel">
                    <h3>📬 信封设置</h3>
                    <div class="style-controls">
                        <div class="control-row">
                            <label>收信人</label>
                            <input type="text" id="receiver-name" placeholder="收件人姓名">
                        </div>
                        <div class="control-row">
                            <label>收信地址</label>
                            <input type="text" id="receiver-address" placeholder="收件地址">
                        </div>
                        <div class="control-row">
                            <label>寄信人</label>
                            <input type="text" id="sender-name" placeholder="寄件人姓名">
                        </div>
                        <div class="control-row">
                            <label>寄信地址</label>
                            <input type="text" id="sender-address" placeholder="寄件地址">
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>💾 导出选项</h3>
                    <div class="style-controls">
                        <div class="control-row">
                            <label>
                                <input type="checkbox" id="transparent-bg"> 透明背景
                            </label>
                        </div>
                        <div class="control-row">
                            <label>导出倍率</label>
                            <select id="export-scale">
                                <option value="1">1x (标准)</option>
                                <option value="2" selected>2x (高清)</option>
                                <option value="3">3x (超清)</option>
                            </select>
                        </div>
                        <button id="export-letter" class="btn-primary">📄 导出信纸</button>
                        <button id="export-envelope" class="btn-primary">✉️ 导岀信封</button>
                        <div class="control-row">
                            <label>
                                <input type="checkbox" id="keep-drafts" checked> 清除缓存时保留草稿
                            </label>
                        </div>
                        <button id="save-draft" class="btn-secondary">💾 保存草稿</button>
                        <button id="load-draft" class="btn-secondary">📂 恢复草稿</button>
                        <button id="clear-cache" class="btn-danger">🗑️ 清除缓存</button>
                    </div>
                </div>
            </aside>

            <main class="canvas-area">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="letter">💌 信纸</button>
                    <button class="tab-btn" data-tab="envelope">✉️ 信封</button>
                    <button class="tab-btn" data-tab="decorations">🎨 装饰管理</button>
                </div>

                <div class="canvas-container" id="letter-tab">
                    <div class="page-info" id="page-info"></div>
                    <div class="canvas-wrapper">
                        <canvas id="letter-canvas" width="800" height="1100"></canvas>
                        <canvas id="drawing-canvas" width="800" height="1100"></canvas>
                        <div id="decoration-layer"></div>
                    </div>
                </div>

                <div class="canvas-container" id="envelope-tab" style="display:none;">
                    <div class="canvas-wrapper">
                        <canvas id="envelope-canvas" width="1000" height="700"></canvas>
                    </div>
                </div>

                <div class="canvas-container" id="decorations-tab" style="display:none;">
                    <div class="decoration-manager">
                        <h3>已添加的装饰</h3>
                        <p class="hint">点击下方装饰可调整透明度和位置</p>
                        <div id="decoration-list"></div>
                    </div>
                </div>
            </main>
        </div>

        <footer class="app-footer">
            <p>💌 每一封信，都是一份温柔的心意</p>
        </footer>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-dialog">
            <h3 id="modal-title">确认操作</h3>
            <p id="modal-message">确定要执行此操作吗？</p>
            <div id="modal-extra" class="modal-extra"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">取消</button>
                <button id="modal-confirm" class="btn-danger">确定</button>
            </div>
        </div>
    </div>

    <div id="rename-modal" class="modal-overlay">
        <div class="modal-dialog">
            <h3>重命名草稿</h3>
            <input type="text" id="rename-input" placeholder="请输入新名称" maxlength="30">
            <div class="modal-actions">
                <button id="rename-cancel" class="btn-secondary">取消</button>
                <button id="rename-confirm" class="btn-primary">确定</button>
            </div>
        </div>
    </div>

    <div id="folder-modal" class="modal-overlay">
        <div class="modal-dialog">
            <h3 id="folder-modal-title">新建分类</h3>
            <div class="folder-icon-picker">
                <span class="folder-icon-label">选择图标：</span>
                <div class="folder-icon-options">
                    <button class="folder-icon-option active" data-icon="💌">💌</button>
                    <button class="folder-icon-option" data-icon="🏠">🏠</button>
                    <button class="folder-icon-option" data-icon="💕">💕</button>
                    <button class="folder-icon-option" data-icon="📝">📝</button>
                    <button class="folder-icon-option" data-icon="🎁">🎁</button>
                    <button class="folder-icon-option" data-icon="🌸">🌸</button>
                    <button class="folder-icon-option" data-icon="🎨">🎨</button>
                    <button class="folder-icon-option" data-icon="📚">📚</button>
                    <button class="folder-icon-option" data-icon="⭐">⭐</button>
                    <button class="folder-icon-option" data-icon="🌙">🌙</button>
                </div>
            </div>
            <input type="text" id="folder-name-input" placeholder="请输入分类名称" maxlength="10">
            <div class="folder-color-picker">
                <span class="folder-color-label">选择颜色：</span>
                <div class="folder-color-options">
                    <button class="folder-color-option active" data-color="pink" style="background: var(--macaron-pink);"></button>
                    <button class="folder-color-option" data-color="peach" style="background: var(--macaron-peach);"></button>
                    <button class="folder-color-option" data-color="yellow" style="background: var(--macaron-yellow);"></button>
                    <button class="folder-color-option" data-color="green" style="background: var(--macaron-green);"></button>
                    <button class="folder-color-option" data-color="blue" style="background: var(--macaron-blue);"></button>
                    <button class="folder-color-option" data-color="purple" style="background: var(--macaron-purple);"></button>
                    <button class="folder-color-option" data-color="cream" style="background: var(--macaron-cream);"></button>
                </div>
            </div>
            <div class="modal-actions">
                <button id="folder-cancel" class="btn-secondary">取消</button>
                <button id="folder-confirm" class="btn-primary">确定</button>
            </div>
        </div>
    </div>

    <div id="move-folder-modal" class="modal-overlay">
        <div class="modal-dialog">
            <h3 id="move-folder-title">移动到文件夹</h3>
            <p id="move-folder-desc" style="margin-bottom: 16px; color: var(--text-light);">选择目标文件夹：</p>
            <div id="move-folder-list" class="move-folder-list"></div>
            <div class="modal-actions">
                <button id="move-folder-cancel" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
